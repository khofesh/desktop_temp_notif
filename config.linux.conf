# Desktop Temperature Monitor — Linux sample config
# Pass this file as the first argument: ./desktop_temp_notif config.linux.conf

# Seconds between sensor reads
poll_interval=30

# Seconds before re-notifying the same sensor at the same alert level
notification_cooldown=300

# Thresholds (°C) — sensor names as reported by lm-sensors
SYSTIN.warning=70
SYSTIN.critical=80

CPUTIN.warning=75
CPUTIN.critical=80

SMBUSMASTER 0.warning=75
SMBUSMASTER 0.critical=80

Tctl.warning=85
Tctl.critical=95

Tccd1.warning=85
Tccd1.critical=95

Tccd2.warning=85
Tccd2.critical=95

temp1.warning=100
temp1.critical=115
