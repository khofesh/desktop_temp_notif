# Desktop Temperature Monitor — Windows sample config
# Pass this file as the first argument: desktop_temp_notif.exe config.windows.conf

# Seconds between sensor reads
poll_interval=30

# Seconds before re-notifying the same sensor at the same alert level
notification_cooldown=300

# Thresholds (°C) — sensor names as reported by LibreHardwareMonitor
# Run: DesktopTempNotif.exe --list-sensors to see the exact names on your machine

# AMD CPU die temperature
Core (Tctl/Tdie).warning=85
Core (Tctl/Tdie).critical=95

# DDR5 DIMM (high limit 55°C, critical 85°C per SPD)
DIMM #1.warning=50
DIMM #1.critical=80

# Integrated GPU (Radeon 780M)
GPU VR SoC.warning=80
GPU VR SoC.critical=100

# NVMe SSD (warning 79°C, critical 82°C per SMART data)
Composite Temperature.warning=60
Composite Temperature.critical=79

Temperature #1.warning=60
Temperature #1.critical=79

Temperature #2.warning=60
Temperature #2.critical=79
